<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT Sensor Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>🤖 IoT Sensor Simulator</h1>
            <div class="header-meta">
                <span id="active-count" class="badge">0 активных</span>
                <button class="btn btn-danger btn-sm" onclick="stopAll()">⏹ Остановить все</button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="grid-2">

            <!-- Форма запуска симуляции -->
            <div class="panel">
                <h2>▶ Новая симуляция</h2>
                <form id="sim-form">
                    <div class="form-group">
                        <label for="sensor_id">ID датчика <span class="hint">(из платформы)</span></label>
                        <input type="number" id="sensor_id" name="sensor_id" min="1" placeholder="Например: 1" required>
                    </div>

                    <div class="form-group">
                        <label for="sensor_type">Тип датчика</label>
                        <select id="sensor_type" name="sensor_type" onchange="updateDefaults()">
                            {% for type in sensor_types %}
                            <option value="{{ type }}">{{ type | capitalize }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="min_value">Мин. значение</label>
                            <input type="number" id="min_value" name="min_value" step="0.1" value="-10">
                        </div>
                        <div class="form-group">
                            <label for="max_value">Макс. значение</label>
                            <input type="number" id="max_value" name="max_value" step="0.1" value="40">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="interval">Интервал отправки (сек)</label>
                        <input type="number" id="interval" name="interval" min="1" max="60" value="5">
                    </div>

                    <div class="form-group">
                        <label for="trend">Тренд</label>
                        <select id="trend" name="trend">
                            <option value="none">Без тренда (стабильно)</option>
                            <option value="up">↑ Рост</option>
                            <option value="down">↓ Падение</option>
                        </select>
                    </div>

                    <div class="checkbox-row">
                        <label class="checkbox-label">
                            <input type="checkbox" id="noise" name="noise" checked>
                            <span>🌊 Добавить шум</span>
                        </label>
                        <label class="checkbox-label">
                            <input type="checkbox" id="outliers" name="outliers">
                            <span>⚡ Добавить выбросы</span>
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full">▶ Запустить симуляцию</button>
                </form>
            </div>

            <!-- Активные симуляции -->
            <div class="panel">
                <div class="panel-header">
                    <h2>📡 Активные симуляции</h2>
                    <button class="btn btn-sm btn-outline" onclick="loadSimulations()">🔄 Обновить</button>
                </div>
                <div id="sim-list-container">
                    <p class="empty-msg" id="no-sims-msg">Нет активных симуляций</p>
                    <div id="sim-cards"></div>
                </div>
            </div>
        </div>

        <!-- Лог в реальном времени -->
        <div class="panel log-panel">
            <div class="panel-header">
                <h2>📋 Лог (реальное время)</h2>
                <div class="log-controls">
                    <label class="checkbox-label">
                        <input type="checkbox" id="auto-scroll" checked>
                        <span>Авто-прокрутка</span>
                    </label>
                    <button class="btn btn-sm btn-outline" onclick="clearLog()">🗑 Очистить</button>
                </div>
            </div>
            <div id="log-container">
                <pre id="log"></pre>
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
